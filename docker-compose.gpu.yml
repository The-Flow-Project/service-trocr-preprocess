# docker-compose.gpu.yml
#
# GPU override – switches both services to the CUDA runtime target and adds
# NVIDIA device reservations. All version variables come from .env.
#
# Usage:
#   docker compose -f docker-compose.traefik.yml -f docker-compose.gpu.yml up --build -d
#
# Prerequisites:
#   - NVIDIA Container Toolkit installed on the host
#   - GPU build variables set in .env (see .env.example)

services:

  trocr-preprocess:
    build:
      target: runtime-gpu
      args:
        TORCH_VERSION: ${TORCH_VERSION}
        TORCHVISION_VERSION: ${TORCHVISION_VERSION}
        TORCH_VARIANT: ${TORCH_VARIANT}
        CUDA_RUNTIME_IMAGE: ${CUDA_RUNTIME_IMAGE}
    deploy: &gpu-deploy
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]

  celery-worker:
    build:
      target: runtime-gpu
      args:
        TORCH_VERSION: ${TORCH_VERSION}
        TORCHVISION_VERSION: ${TORCHVISION_VERSION}
        TORCH_VARIANT: ${TORCH_VARIANT}
        CUDA_RUNTIME_IMAGE: ${CUDA_RUNTIME_IMAGE}
    deploy: *gpu-deploy
