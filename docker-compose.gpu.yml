# docker-compose.gpu.yml
#
# GPU add-on – orthogonal override that STACKS on either base:
#   local:    docker compose -f docker-compose.yml         -f docker-compose.gpu.yml up --build -d
#   traefik:  docker compose -f docker-compose.traefik.yml -f docker-compose.gpu.yml up --build -d
#
# It only rebuilds the torch wheel with CUDA support (TORCH_VARIANT) and reserves the
# host GPU(s). The runtime base image is unchanged (python:3.12-slim) — the cu124 torch
# wheel bundles its own CUDA libraries, so the only host requirement is the NVIDIA driver.
#
# Prerequisites:
#   - Linux host with an NVIDIA GPU (NOT macOS — Docker Desktop has no GPU passthrough)
#   - NVIDIA Container Toolkit installed and configured for Docker
#   - GPU build vars set in .env (TORCH_VERSION / TORCHVISION_VERSION / TORCH_VARIANT)
#
# AIDEV-NOTE: distinct ":gpu" image tag so a GPU build doesn't clobber the CPU ":latest"
# image. Build args come from .env and are consumed only here (the CPU bases pass no args).

services:

  trocr-preprocess:
    image: service-trocr-preprocess:gpu
    build:
      args:
        TORCH_VERSION: ${TORCH_VERSION}
        TORCHVISION_VERSION: ${TORCHVISION_VERSION}
        TORCH_VARIANT: ${TORCH_VARIANT}
    deploy: &gpu-deploy
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]

  celery-worker:
    image: service-trocr-preprocess:gpu
    build:
      args:
        TORCH_VERSION: ${TORCH_VERSION}
        TORCHVISION_VERSION: ${TORCHVISION_VERSION}
        TORCH_VARIANT: ${TORCH_VARIANT}
    deploy: *gpu-deploy