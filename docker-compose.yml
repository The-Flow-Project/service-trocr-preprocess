# docker-compose.yml
#
# Usage:
#   docker compose -f docker-compose.yml up --build -d
#
# Variables (in .env or hardcoded in this file):
#   CELERY_CONCURRENCY – number of worker processes for the Celery worker (default: 2)
#   LOG_LEVEL         – log level for both FastAPI and Celery (default: "info")

services:
  # ── Redis (message broker + status storage) ────────────────────────
  redis:
    image: redis:7-alpine
    container_name: trocr-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI service ────────────────────────────────────────────────
  trocr-preprocess:
    image: service-trocr-preprocess:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    pull_policy: missing
    container_name: service-trocr-preprocess
    ports:
      - "8000:8000"
    networks:
      - default
      - flow-apis
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

    # Health check
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Celery worker ──────────────────────────────────────────────────
  celery-worker:
    image: service-trocr-preprocess:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    pull_policy: missing
    container_name: trocr-celery-worker
    command: celery -A app.tasks worker --loglevel ${LOG_LEVEL} --concurrency ${CELERY_CONCURRENCY}
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - CELERY_CONCURRENCY=${CELERY_CONCURRENCY:-2}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

    healthcheck:
      test: [ "CMD-SHELL", "test -d /proc/1 || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

# ── Volumes ──────────────────────────────────────────────────────────
volumes:
  redis-data:
    driver: local

# ── Networks ─────────────────────────────────────────────────────────
networks:
  flow-apis:
    external: true

