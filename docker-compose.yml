services:
  trocr-preprocess:
    image: service-trocr-preprocess:latest
    build:
      context: .
      dockerfile: Dockerfile
    pull_policy: missing
    container_name: service-trocr-preprocess
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - STORAGE_PATH=/data/preprocessing-status.json

    volumes:
      # Persist data
      - ./data:/data

      # Optional: Mount app for development (hot reload)
      # Uncomment for development:
      # - ./src:/app/src

    restart: unless-stopped

    # Health check
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    # Resource limits (optional but recommended for production)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 1G

# Optional: Networks for multi-container setups
networks:
  default:
    name: trocr-network

