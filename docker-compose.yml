services:
  # ── Redis (message broker + status storage) ────────────────────────
  redis:
    image: redis:7-alpine
    container_name: trocr-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI service ────────────────────────────────────────────────
  trocr-preprocess:
    image: service-trocr-preprocess:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TORCH_VARIANT: ${TORCH_VARIANT:-cpu}  # Override: TORCH_VARIANT=cu128 docker compose up --build
    pull_policy: missing
    container_name: service-trocr-preprocess
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

    # Health check
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    # Resource limits (optional but recommended for production)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 1G

  # ── Celery worker ──────────────────────────────────────────────────
  celery-worker:
    image: service-trocr-preprocess:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TORCH_VARIANT: ${TORCH_VARIANT:-cpu}
    pull_policy: missing
    container_name: trocr-celery-worker
    command: celery -A app.tasks worker --loglevel=${LOG_LEVEL:-info} --concurrency=2
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

    # Resource limits for the worker
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 1G

# ── Volumes ──────────────────────────────────────────────────────────
volumes:
  redis-data:
    driver: local

# ── Networks ─────────────────────────────────────────────────────────
networks:
  default:
    name: trocr-network

