# docker-compose.traefik.yml — overlay for the shared Traefik proxy.
#   docker compose -f docker-compose.yml -f docker-compose.traefik.yml up -d
# (no --build-arg on `up`; CPU image needs none)

services:
  service-preprocess:
    environment:
      - HTTPS_REDIRECT=false          # Traefik terminates TLS / handles redirect
    networks:
      - flow-apis
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.trocr.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.trocr.entrypoints=websecure"
      - "traefik.http.routers.trocr.tls=true"
      - "traefik.http.routers.trocr.tls.certresolver=letsencrypt"
      - "traefik.http.services.trocr.loadbalancer.server.port=8000"

networks:
  traefik-public:
    external: true