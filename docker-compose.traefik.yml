# docker-compose.traefik.yml
#
# Production setup – connects to the existing shared Traefik proxy on this host.
# Prerequisite: Traefik is already running via ~/webapps/docker-compose-traefik.yml
# and the "traefik_net" network exists.
#
# Usage:
#   docker compose -f docker-compose.traefik.yml up --build -d
#
# Required .env variables (in addition to the defaults from .env.example):
#   APP_DOMAIN        – public hostname, e.g. preprocessing.flow-project.net
#   HTTPS_REDIRECT    – must be set to "false" (Traefik handles the redirect)
#   CORS_ALLOWED_ORIGINS – must include "https://<APP_DOMAIN>"

services:

  # ── Redis (message broker + status storage) ────────────────────────
  redis:
    image: redis:7-alpine
    container_name: trocr-redis
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trocr-network  # internal only, not exposed to Traefik

  # ── FastAPI service ────────────────────────────────────────────────
  trocr-preprocess:
    image: service-trocr-preprocess:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TORCH_VARIANT: ${TORCH_VARIANT:-cpu}  # Override: TORCH_VARIANT=cu128 docker compose -f docker-compose.traefik.yml up --build
    pull_policy: missing
    container_name: service-trocr-preprocess
    # No direct port exposure – Traefik handles all ingress
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=production
      # Traefik terminates TLS; FastAPI must NOT redirect HTTP→HTTPS internally
      - HTTPS_REDIRECT=false
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 1G
    labels:
      - "traefik.enable=true"
      # Explicitly tell Traefik which network to use (container is on two networks)
      - "traefik.docker.network=traefik_net"
      # Router
      - "traefik.http.routers.trocr.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.trocr.entrypoints=web,websecure"
      - "traefik.http.routers.trocr.tls.certresolver=letsencrypt"
      # Backend port (uvicorn listens on 8000 inside the container)
      - "traefik.http.services.trocr.loadbalancer.server.port=8000"
    networks:
      - trocr-network  # can reach Redis
      - traefik_net    # Traefik can reach this container

  # ── Celery worker ──────────────────────────────────────────────────
  celery-worker:
    image: service-trocr-preprocess:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TORCH_VARIANT: ${TORCH_VARIANT:-cpu}
    pull_policy: missing
    container_name: trocr-celery-worker
    command: celery -A app.tasks worker --loglevel=${LOG_LEVEL:-info} --concurrency=2
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 1G
    networks:
      - trocr-network  # internal only, no Traefik labels needed

# ── Volumes ──────────────────────────────────────────────────────────
volumes:
  redis-data:
    driver: local

# ── Networks ─────────────────────────────────────────────────────────
networks:
  trocr-network:
    # Private network for inter-service communication (Redis ↔ App ↔ Worker)
    name: trocr-network

  traefik_net:
    # Shared Traefik network – managed by ~/webapps/docker-compose-traefik.yml
    external: true
