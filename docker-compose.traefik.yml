# docker-compose.traefik.yml
#
# Production setup – connects to the existing shared Traefik proxy on this host.
# Prerequisite: Traefik is already running via ~/webapps/docker-compose-traefik.yml
# and the "traefik-public" network exists.
#
# Usage:
#   CPU:  docker compose -f docker-compose.traefik.yml up --build -d
#   GPU:  docker compose -f docker-compose.traefik.yml -f docker-compose.gpu.yml up --build -d
#
# Variables (in .env or hardcoded in this file):
#   APP_DOMAIN        – public hostname, e.g. preprocessing.flow-project.net
#   HTTPS_REDIRECT    – must be set to "false" (Traefik handles the redirect)
#   LOG_LEVEL         – log level for both FastAPI and Celery (default: "info")

services:

  # ── Redis (message broker + status storage) ────────────────────────
  redis:
    image: redis:7-alpine
    container_name: trocr-redis
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trocr-network  # internal only, not exposed to Traefik

  # ── FastAPI service ────────────────────────────────────────────────
  trocr-preprocess:
    image: service-trocr-preprocess:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime-cpu
    pull_policy: missing
    container_name: service-trocr-preprocess
    # No direct port exposure – Traefik handles all ingress
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=production
      # Traefik terminates TLS; FastAPI must NOT redirect HTTP→HTTPS internally
      - HTTPS_REDIRECT=false
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    labels:
      - "traefik.enable=true"
      # Explicitly tell Traefik which network to use (container is on two networks)
      - "traefik.docker.network=traefik-public"
      # HTTPS router – TLS termination + Let's Encrypt certificate
      # HTTP→HTTPS redirect is handled globally by the Traefik entrypoint config,
      # so this router only needs to listen on websecure (port 443).
      - "traefik.http.routers.trocr.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.trocr.entrypoints=websecure"
      - "traefik.http.routers.trocr.tls=true"
      - "traefik.http.routers.trocr.tls.certresolver=letsencrypt"
      # Backend port (uvicorn listens on 8000 inside the container)
      - "traefik.http.services.trocr.loadbalancer.server.port=8000"
    networks:
      - trocr-network  # can reach Redis
      - traefik-public    # Traefik can reach this container

  # ── Celery worker ──────────────────────────────────────────────────
  celery-worker:
    image: service-trocr-preprocess:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime-cpu
    pull_policy: missing
    container_name: trocr-celery-worker
    command: celery -A app.tasks worker --loglevel=${LOG_LEVEL:-info} --concurrency=${CELERY_CONCURRENCY:-2}
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

    healthcheck:
      test: [ "CMD-SHELL", "test -d /proc/1 || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - trocr-network  # internal only, no Traefik labels needed

# ── Volumes ──────────────────────────────────────────────────────────
volumes:
  redis-data:
    driver: local

# ── Networks ─────────────────────────────────────────────────────────
networks:
  trocr-network:
    # Private network for inter-service communication (Redis ↔ App ↔ Worker)
    name: trocr-network

  traefik-public:
    # Shared Traefik network – managed by ~/webapps/docker-compose-traefik.yml
    external: true
